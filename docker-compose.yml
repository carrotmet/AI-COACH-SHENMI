# =============================================================================
# 深寻觅 AI Coach - Docker Compose 配置
# 完整的服务编排，包含后端、前端、Nginx反向代理
# =============================================================================

version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # 后端API服务
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ai_coach_backend
    image: shenxunmi/ai-coach-backend:latest
    ports:
      - "8080:8080"
    volumes:
      # 只挂载数据库文件（不是整个目录）
      - ./data/ai_coach.db:/app/data/ai_coach.db
      # 日志持久化
      - ./logs:/app/logs
      # 临时文件
      - ./temp:/app/temp
    environment:
      # 应用配置
      - APP_ENV=production
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8080
      
      # 数据库配置
      - DATABASE_URL=sqlite+aiosqlite:///data/ai_coach.db
      - DATABASE_POOL_SIZE=10
      
      # 安全配置（从环境文件读取）
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      
      # AI服务配置
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=2000
      
      # 可选：其他AI提供商
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY:-}
      
      # 对话限制配置
      - FREE_DAILY_CHAT_LIMIT=3
      - BASIC_DAILY_CHAT_LIMIT=20
      - PRO_DAILY_CHAT_LIMIT=-1
      
      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/app.log
      - LOG_MAX_BYTES=10485760
      - LOG_BACKUP_COUNT=5
      
    restart: unless-stopped
    networks:
      - ai_coach_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Nginx反向代理
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ai_coach_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 前端静态文件
      - ./frontend:/usr/share/nginx/html:ro
      # Nginx配置
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL证书（可选）
      - ./ssl:/etc/nginx/ssl:ro
      # Nginx日志
      - ./logs/nginx:/var/log/nginx
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai_coach_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Redis缓存服务（可选）
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai_coach_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - ai_coach_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# -----------------------------------------------------------------------------
# 网络配置
# -----------------------------------------------------------------------------
networks:
  ai_coach_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# -----------------------------------------------------------------------------
# 数据卷配置
# -----------------------------------------------------------------------------
volumes:
  redis_data:
    driver: local

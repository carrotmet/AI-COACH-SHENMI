<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="深觅 AI Coach 个人星图 - 可视化的性格优势图谱">
    <title>我的星图 - 深觅 AI Coach</title>
    
    <!-- 样式文件 -->
    <link rel="stylesheet" href="../styles/variables.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/layout.css">
    
    <!-- AntV G6 图可视化库 -->
    <script src="https://unpkg.com/@antv/g6@4.8.0/dist/g6.min.js"></script>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    
    <style>
        /* 星图页面专用样式 */
        .star-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .star-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        
        /* 星图画布区域 */
        .star-canvas-wrapper {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        }
        
        #star-canvas {
            width: 100%;
            height: 100%;
        }
        
        /* 加载状态 */
        .star-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        
        .star-loading__spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 画布控制栏 */
        .star-controls {
            position: absolute;
            bottom: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        
        .star-control-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: white;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .star-control-btn:hover {
            background: var(--color-primary-light);
            border-color: var(--color-primary);
        }
        
        .star-control-btn svg {
            width: 20px;
            height: 20px;
            color: var(--color-text);
        }
        
        /* 图例 */
        .star-legend {
            position: absolute;
            top: 24px;
            right: 24px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 100;
            min-width: 180px;
        }
        
        .star-legend__title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 12px;
        }
        
        .star-legend__item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        
        .star-legend__dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* 详情面板 */
        .star-detail-panel {
            width: 380px;
            background: white;
            border-left: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 200;
        }
        
        .star-detail-panel--collapsed {
            transform: translateX(100%);
        }
        
        @media (max-width: 768px) {
            .star-detail-panel {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: 85%;
                max-width: 360px;
                box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            }
        }
        
        .star-detail__header {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .star-detail__title {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text);
        }
        
        .star-detail__close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .star-detail__close:hover {
            background: var(--color-bg-secondary);
        }
        
        .star-detail__content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .star-detail__empty {
            text-align: center;
            color: var(--color-text-secondary);
            padding: 40px 20px;
        }
        
        /* 节点信息卡片 */
        .node-info-card {
            background: var(--color-bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .node-info-card__header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .node-info-card__icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .node-info-card__title {
            flex: 1;
        }
        
        .node-info-card__name {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
        }
        
        .node-info-card__type {
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        
        .node-info-card__score {
            text-align: right;
        }
        
        .node-info-card__score-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .node-info-card__score-label {
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        
        .node-info-card__description {
            font-size: 14px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }
        
        /* AI建议区域 */
        .ai-suggestions {
            margin-top: 24px;
        }
        
        .ai-suggestions__title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .ai-suggestions__title::before {
            content: "💡";
        }
        
        .ai-suggestion-item {
            background: linear-gradient(135deg, #e8f4fd 0%, #f0f9ff 100%);
            border: 1px solid #bae6fd;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--color-text);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ai-suggestion-item:hover {
            background: linear-gradient(135deg, #dbeafe 0%, #e0f2fe 100%);
            border-color: #7dd3fc;
            transform: translateX(4px);
        }
        
        /* 顶部信息栏 */
        .star-info-bar {
            position: absolute;
            top: 24px;
            left: 24px;
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 100;
            max-width: 300px;
        }
        
        .star-info-bar__title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        
        .star-info-bar__desc {
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        
        /* 空状态 */
        .star-empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }
        
        .star-empty-state__icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .star-empty-state__title {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 12px;
        }
        
        .star-empty-state__desc {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }
    </style>
</head>
